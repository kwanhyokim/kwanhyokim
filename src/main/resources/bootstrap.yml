spring.application.name: personal-api
server.port: 80
spring.profiles.active: dev

spring.cloud.config.name: personal-api,lib-module

management:
  security.enabled : false
  context-path : /acturator
  endpoints.web.exposure.include : refresh

eureka.instance:
  non-secure-port: ${server.port}
  prefer-ip-address: true

