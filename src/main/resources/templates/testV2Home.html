<!DOCTYPE html>
<html lang="en">
<head>
    <title>홈 패널 테스트 기능</title>
    <meta charset="utf-8">
    <script
            src="https://code.jquery.com/jquery-2.2.4.min.js"
            integrity="sha256-BbhdlvQf/xTY9gja0Dq3HiwQF8LaCRTXxZKRutelT44="
            crossorigin="anonymous"></script>
    <style>
        .board_list {width:100%;border-top:2px solid #252525;border-bottom:1px solid #ccc}
        .board_list thead th:first-child{background-image:none}
        .board_list thead th {border-bottom:1px solid #ccc;padding:12px 0 13px 0;color:#3b3a3a;vertical-align:middle}
        .board_list tbody tr:first-child td {border:none}
        .board_list tbody td {padding:10px 0;text-align:center;vertical-align:middle}
        .board_list tbody td a {display:inline-block}
        .memberTr {cursor: pointer;}
        .mar_tx_20 {margin-top: 20px;}
    </style>
</head>
<body>
    <div>
        <form id="frm_member">
            <label for="member_no"> member_no</label>
            <input type="text" id="member_no" name="characterNo" class=".search">
            <label for="character_no"> character_no</label>
            <input type="text" id="character_no" name="character_no" class=".search">
            <label for="app_version"> app_version</label>
            <input type="text" id="app_version" name="app_version" class=".search">

            <br/>
            <button name="btn_clearCache">홈 패널 캐쉬 지우기</button>
            <button name="btn_todayFloSelect">오늘의 FLO 생성하기</button>
            <button name="btn_forMeFloSelect">나를 위한 FLO 생성하기</button>
            <button name="btn_artistFloSelect">아티스트FLO 생성하기</button>
            <br/>
            <button name="btn_defaultUserSelect">디폴트 캐릭터로 설정하기</button>
            <button name="btn_afloUserSelect">AFLO 캐릭터로 설정하기</button>
            <br/>

<!--            <button name="btn_showLayout">내 레이아웃 보기</button>-->
        </form>
    </div>
    <div id="layout">


    </div>



    <script type="text/javascript">
        $(document).ready(function () {

            $("button[name='btn_clearCache']").on("click", function (e) {
                e.preventDefault();
                fn_ajax(null, "GET", "/personal/test/clearHomeCache", "characterNo="+$("#character_no").val(), fn_success);
            });

            $("button[name='btn_todayFloSelect']").on("click", function (e) {
                e.preventDefault();
                fn_ajax(null, "GET", "/personal/test/makeRecommendPanel", "type=RC_SML_TR&characterNo="+$("#character_no").val(), fn_success);
            });

            $("button[name='btn_forMeFloSelect']").on("click", function (e) {
                e.preventDefault();
                fn_ajax(null, "GET", "/personal/test/makeRecommendPanel", "type=RC_CF_TR&characterNo="+$("#character_no").val(), fn_success);
            });

            $("button[name='btn_artistFloSelect']").on("click", function (e) {
                e.preventDefault();
                fn_ajax(null, "GET", "/personal/test/makeRecommendPanel", "type=RC_ATST_TR&characterNo="+$("#character_no").val(), fn_success);
            });

            $("button[name='btn_defaultUserSelect']").on("click", function (e) {
                e.preventDefault();
                fn_ajax(null, "GET", "/personal/test/changeCharacterType", "type=DEFAULT&characterNo="+$("#character_no").val(), fn_success);
            });

            $("button[name='btn_afloUserSelect']").on("click", function (e) {
                e.preventDefault();
                fn_ajax(null, "GET", "/personal/test/changeCharacterType", "type=AFLO&characterNo="+$("#character_no").val(), fn_success);
            });

            $("button[name='btn_showLayout']").on("click", function (e) {
                e.preventDefault();
                fn_ajax({'x-gm-member-no':$("#member_no").val(), 'x-gm-character-no':$("#character_no").val()},
                    "GET", "https://qa-api.music-flo.com/display/v2/home/layout", null, function(result){

                    }


                );
            });

        });

        function fn_success(result){
            alert(result);
        }

        function fn_ajax(headers, type, url, data, success){
            $.ajax({
                type: type,
                headers: headers,
                url : url,
                dataType : "json",
                contentType : "application/json",
                data : data,
                success : success
                ,
                error : function(jqXHR, textStatus, errorThrown) {
                    alert(errorThrown);
                    var body = $("table>tbody");
                    body.empty();
                }

            })
        }

    </script>
</body>
</html>
